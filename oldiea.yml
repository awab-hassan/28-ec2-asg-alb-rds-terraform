version: 0.2
phases:
  install:
    commands:
      - echo "Installing Terraform..."
      # Example Terraform installation steps:
      - curl -o terraform.zip https://releases.hashicorp.com/terraform/1.5.7/terraform_1.5.7_linux_amd64.zip
      - unzip terraform.zip && mv terraform /usr/local/bin/
      - terraform --version
  build:
    commands:
      - echo "Running Terraform apply for environment $ENVIRONMENT..."
      - terraform init
      - terraform apply -auto-approve -var="environment=$USERNAME"
artifacts:
  files:
    - 'main.tf'
